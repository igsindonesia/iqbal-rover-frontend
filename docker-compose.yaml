services:
  # ========================================
  # 🟢 DEVELOPMENT: Vite Dev Server (HMR)
  # ========================================
  frontend:
    profiles: ['dev']
    
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    
    container_name: ${FE_CONTAINER_NAME:-frontend-rover-dev}
    
    # ✅ Port: host:5173 → container:5173 (Vite)
    ports:
      - "${FE_PORT_EXPOSE:-5173}:5173"
    
    env_file:
      - ${ENV_FILE:-.env.dev}
    
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - VITE_BACKEND_URL=${VITE_BACKEND_URL}
    
    volumes:
      - .:/app:cached
      - /app/node_modules
      # ❌ Jangan mount nginx.conf di dev
    
    command: yarn dev --mode ${VITE_MODE:-dev} --host 0.0.0.0
    
    extra_hosts:
      - "host.docker.internal:host-gateway"
    
    develop:
      watch:
        - action: sync
          path: ./src
          target: /app/src
        - action: rebuild
          path: package.json
          target: /app/package.json
    
    networks:
      - rover-app-network
    
    restart: unless-stopped

  # ========================================
  # 🔴 PRODUCTION: Nginx Serve Static
  # ========================================
  frontend-prod:
    profiles: ['prod']
    
    build:
      context: .
      dockerfile: Dockerfile
      target: production
      args:
        VITE_MODE: ${VITE_MODE:-production}
    
    container_name: ${FE_CONTAINER_NAME:-frontend-rover}
    
    # ✅ Port: host:5173 → container:80 (Nginx)
    ports:
      - "${FE_PORT_EXPOSE:-5173}:80"
    
    env_file:
      - ${ENV_FILE:-.env}
    
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - VITE_BACKEND_URL=${VITE_BACKEND_URL}
    
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    
    networks:
      - rover-app-network
    
    restart: unless-stopped

networks:
  rover-app-network:
    name: rover-app-network
    driver: bridge
    external: true